<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" fill="#1a4d4d"/>
  
  <!-- Tree trunk -->
  <line x1="64" y1="90" x2="64" y2="65" stroke="#7cbd7c" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Main branches -->
  <line x1="64" y1="65" x2="50" y2="50" stroke="#7cbd7c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="65" x2="78" y2="50" stroke="#7cbd7c" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Left side branches -->
  <line x1="50" y1="50" x2="38" y2="38" stroke="#7cbd7c" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="45" y2="35" stroke="#7cbd7c" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="38" x2="30" y2="30" stroke="#7cbd7c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="38" x2="35" y2="28" stroke="#7cbd7c" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Right side branches -->
  <line x1="78" y1="50" x2="90" y2="38" stroke="#7cbd7c" stroke-width="2" stroke-linecap="round"/>
  <line x1="78" y1="50" x2="83" y2="35" stroke="#7cbd7c" stroke-width="2" stroke-linecap="round"/>
  <line x1="90" y1="38" x2="98" y2="30" stroke="#7cbd7c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="90" y1="38" x2="93" y2="28" stroke="#7cbd7c" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Connection points (pads) at branch ends -->
  <circle cx="30" cy="30" r="2" fill="#7cbd7c"/>
  <circle cx="35" cy="28" r="2" fill="#7cbd7c"/>
  <circle cx="45" cy="35" r="2" fill="#7cbd7c"/>
  <circle cx="83" cy="35" r="2" fill="#7cbd7c"/>
  <circle cx="93" cy="28" r="2" fill="#7cbd7c"/>
  <circle cx="98" cy="30" r="2" fill="#7cbd7c"/>
  
  <!-- Resistors (rectangles with leads) -->
  <!-- Resistor 1 - on left branch -->
  <line x1="42" y1="44" x2="46" y2="42.5" stroke="#7cbd7c" stroke-width="1"/>
  <rect x="46" y="41" width="8" height="3" fill="none" stroke="#d4a574" stroke-width="1.5"/>
  <line x1="54" y1="42.5" x2="58" y2="41" stroke="#7cbd7c" stroke-width="1"/>
  
  <!-- Resistor 2 - on right branch -->
  <line x1="70" y1="41" x2="74" y2="42.5" stroke="#7cbd7c" stroke-width="1"/>
  <rect x="74" y="41" width="8" height="3" fill="none" stroke="#d4a574" stroke-width="1.5"/>
  <line x1="82" y1="42.5" x2="86" y2="44" stroke="#7cbd7c" stroke-width="1"/>
  
  <!-- Resistor 3 - on upper left -->
  <line x1="32" y1="34" x2="33" y2="32" stroke="#7cbd7c" stroke-width="0.8"/>
  <rect x="33" y="28" width="5" height="2" fill="none" stroke="#d4a574" stroke-width="1"/>
  <line x1="38" y1="29" x2="39" y2="31" stroke="#7cbd7c" stroke-width="0.8"/>
  
  <!-- Text -->
  <text x="64" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#7cbd7c" text-anchor="middle">LIANA</text>
</svg>
